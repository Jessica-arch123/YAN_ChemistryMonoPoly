<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemistryPoly by YAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6c5ce7; --accent: #00d2d3; --bg: #0f172a; --card: rgba(255, 255, 255, 0.1); --gold: #feca57; --pink: #ff9ff3; --red: #ff7675; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .game-container { background: #1e293b; width: 100%; max-width: 600px; border-radius: 40px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }
        .screen { display: none; padding: 20px; text-align: center; }
        .active { display: block; }

        /* Board */
        .board-track { display: grid; grid-template-columns: repeat(7, 1fr); grid-template-rows: repeat(7, 1fr); gap: 4px; padding: 10px; background: rgba(0,0,0,0.2); height: 450px; position: relative; }
        .tile { background: var(--card); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: #cbd5e1; border: 1.5px solid transparent; text-align: center; line-height: 1.1; position: relative; transition: 0.5s; }
        .owner-tag { position: absolute; top: -5px; font-size: 1.2rem; filter: drop-shadow(0 0 3px black); z-index: 10; }
        .player-piece { position: absolute; font-size: 1.4rem; z-index: 100; transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: none; }
        .center-space { grid-column: 2 / 7; grid-row: 2 / 7; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border-radius: 20px; margin: 5px; }

        /* --- 3D DICE --- */
        .dice-wrap { perspective: 800px; width: 60px; height: 60px; margin-bottom: 20px; cursor: pointer; }
        .dice { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .dice-face { position: absolute; width: 60px; height: 60px; background: white; border: 2px solid #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: 900; font-size: 1.8rem; box-shadow: inset 0 0 15px rgba(0,0,0,0.1); }
        .f1 { transform: translateZ(30px); } .f2 { transform: rotateY(180deg) translateZ(30px); }
        .f3 { transform: rotateY(90deg) translateZ(30px); } .f4 { transform: rotateY(-90deg) translateZ(30px); }
        .f5 { transform: rotateX(90deg) translateZ(30px); } .f6 { transform: rotateX(-90deg) translateZ(30px); }

        .rolling { animation: multi-spin 0.4s infinite linear; }
        @keyframes multi-spin { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }

        .btn { width: 85%; padding: 12px; border: none; border-radius: 15px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 8px; }
        .btn-chance-buy { background: var(--pink); color: #000; border: 2px solid white; font-size: 0.7rem; box-shadow: 0 0 15px rgba(255, 159, 243, 0.3); }
        .btn-roll { background: var(--primary); box-shadow: 0 4px 0 #4834d4; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .q-card { background: #1e293b; padding: 25px; border-radius: 30px; width: 90%; max-width: 420px; border: 2px solid var(--primary); text-align: center; }
        .btn-mcq { background: var(--card); color: white; border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; margin-bottom: 8px; width: 100%; cursor: pointer; text-align: left; }
        .p-stat { text-align: center; padding: 5px; opacity: 0.3; flex: 1; font-size: 0.8rem; }
        .p-stat.active-turn { opacity: 1; background: rgba(255,255,255,0.1); border-radius: 10px; }
        sub, sup { font-size: 0.75em; line-height: 0; position: relative; vertical-align: baseline; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="screen-lobby" class="screen active">
        <span style="color:var(--accent); font-weight:700;">BY YAN</span>
        <h1>ChemistryPoly</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin:20px 0;">
            <div id="card0" onclick="togglePlayer(0)" style="background:var(--card); padding:15px; border-radius:20px; cursor:pointer; border:2px solid transparent;"><span>🐱</span><br><small id="n0">CAT-ALYST</small></div>
            <div id="card1" onclick="togglePlayer(1)" style="background:var(--card); padding:15px; border-radius:20px; cursor:pointer; border:2px solid transparent;"><span>🐶</span><br><small id="n1">DOG-MA</small></div>
            <div id="card2" onclick="togglePlayer(2)" style="background:var(--card); padding:15px; border-radius:20px; cursor:pointer; border:2px solid transparent;"><span>🦊</span><br><small id="n2">FOX-PHATE</small></div>
            <div id="card3" onclick="togglePlayer(3)" style="background:var(--card); padding:15px; border-radius:20px; cursor:pointer; border:2px solid transparent;"><span>🐰</span><br><small id="n3">BUN-SEN</small></div>
        </div>
        <button class="btn" style="background:var(--accent)" id="startBtn" disabled onclick="startGame()">START SESSION</button>
    </div>

    <div id="screen-game" class="screen" style="padding:5px;">
        <div class="board-track" id="board">
            <div class="center-space">
                <div class="dice-wrap" onclick="rollDice()">
                    <div id="dice" class="dice">
                        <div class="dice-face f1">1</div><div class="dice-face f2">2</div><div class="dice-face f3">3</div>
                        <div class="dice-face f4">4</div><div class="dice-face f5">5</div><div class="dice-face f6">6</div>
                    </div>
                </div>
                <h4 id="statusLabel" style="margin:2px 0; font-size:0.7rem;"></h4>
                <button class="btn btn-chance-buy" onclick="buySabotage()">BUY CHANCE (50 PTS)</button>
                <button id="rollBtn" class="btn btn-roll" onclick="rollDice()">ROLL DICE</button>
            </div>
            <div id="piecesContainer"></div>
        </div>
        <div id="dashboard" style="display:flex; background:rgba(0,0,0,0.4); padding:10px; margin-top:10px;"></div>
    </div>
</div>

<div class="overlay" id="qOverlay"><div class="q-card"><h3 id="qHeader">TASK</h3><p id="qText"></p><div id="optionsArea"></div></div></div>

<script>
    const sounds = { roll: new Audio('https://www.soundjay.com/buttons/button-27.mp3'), correct: new Audio('https://www.soundjay.com/buttons/button-3.mp3'), wrong: new Audio('https://www.soundjay.com/buttons/button-10.mp3') };
    function play(t){ sounds[t].currentTime=0; sounds[t].play().catch(()=>{}); }

    const questions = [
        { text: "Definition of Molarity (M)?", options: ["Moles per Liter solution", "Moles per kg solvent", "Grams/L", "Mole fraction"], correct: "Moles per Liter solution" },
        { text: "IUPAC name for [Co(NH<sub>3</sub>)<sub>6</sub>]Cl<sub>3</sub>?", options: ["Hexaamminecobalt(III) chloride", "Hexaamminecobaltate chloride", "Cobalt ammine chloride", "Hexacobalt chloride"], correct: "Hexaamminecobalt(III) chloride" },
        { text: "VSEPR shape of NH<sub>3</sub>?", options: ["Trigonal Pyramidal", "Trigonal Planar", "Tetrahedral", "Bent"], correct: "Trigonal Pyramidal" },
        { text: "EDTA is a ___ ligand.", options: ["Hexadentate", "Bidentate", "Monodentate", "Tridentate"], correct: "Hexadentate" },
        { text: "Henderson-Hasselbalch: pH = pK<sub>a</sub> + log(___)", options: ["[A<sup>-</sup>]/[HA]", "[HA]/[A<sup>-</sup>]", "[OH<sup>-</sup>]/[H<sup>+</sup>]", "K<sub>w</sub>"], correct: "[A<sup>-</sup>]/[HA]" },
        { text: "Bond order for O<sub>2</sub><sup>+</sup>?", options: ["2.5", "2.0", "1.5", "3.0"], correct: "2.5" },
        { text: "Which indicator is best for Strong Acid vs Weak Base?", options: ["Methyl Orange", "Phenolphthalein", "Litmus", "Murexide"], correct: "Methyl Orange" },
        { text: "The Volhard Method involves which type of titration?", options: ["Back titration", "Direct titration", "Redox titration", "EDTA titration"], correct: "Back titration" },
        { text: "Grams of NaOH (MW:40) for 500mL of 0.1M?", options: ["2.0g", "1.0g", "4.0g", "0.5g"], correct: "2.0g" }
    ];

    const tileNames = ["GO", "Molarity", "IUPAC", "AUDIT", "EDTA", "Redox", "Molality", "Mohr", "Buffer", "AUDIT", "pH/pK<sub>a</sub>", "Volhard", "K<sub>sp</sub>", "Precision", "VSEPR", "Henderson", "AUDIT", "Mole Frac", "Iodine", "NaOH Calc", "HCl Calc", "Hybridize", "AUDIT", "Accuracy"];
    const ownerCols = ["#6c5ce7", "#00d2d3", "#e67e22", "#ff9ff3"];

    let players = [], turn = 0, rolling = false, owners = {}, chars = [{id:0, icon:'🐱', n:'CAT-ALYST', a:false},{id:1, icon:'🐶', n:'DOG-MA', a:false},{id:2, icon:'🦊', n:'FOX-PHATE', a:false},{id:3, icon:'🐰', n:'BUN-SEN', a:false}];

    function togglePlayer(id){
        chars[id].a = !chars[id].a;
        document.getElementById('card'+id).style.borderColor = chars[id].a ? 'var(--accent)' : 'transparent';
        document.getElementById('n'+id).innerText = chars[id].a ? 'SELECTED' : chars[id].n;
        document.getElementById('startBtn').disabled = chars.filter(c=>c.a).length < 1;
    }

    function startGame(){
        players = chars.filter(c=>c.a).map(c=>({...c, pos:0, pts:200, skip:false}));
        document.getElementById('screen-lobby').style.display = 'none';
        document.getElementById('screen-game').style.display = 'block';
        initBoard();
    }

    function initBoard(){
        const b = document.getElementById('board');
        let idxs = [0,1,2,3,4,5,6, 23,-1,-1,-1,-1,-1,7, 22,-1,-1,-1,-1,-1,8, 21,-1,-1,-1,-1,-1,9, 20,-1,-1,-1,-1,-1,10, 19,18,17,16,15,14,13,12];
        idxs.forEach((idx, i) => {
            if(idx === -1) return;
            const t = document.createElement('div'); t.id = 't'+idx; t.className = 'tile';
            if(tileNames[idx] === "AUDIT") t.style.background = "var(--red)";
            t.innerHTML = `${tileNames[idx]}`;
            t.style.gridRow = Math.floor(i/7)+1; t.style.gridColumn = (i%7)+1;
            b.appendChild(t);
        });
        const d = document.getElementById('dashboard');
        players.forEach((p, i) => {
            const pc = document.createElement('div'); pc.id = 'piece'+p.id; pc.className = 'player-piece'; pc.innerText = p.icon;
            document.getElementById('piecesContainer').appendChild(pc);
            const st = document.createElement('div'); st.id = 'stat'+i; st.className = 'p-stat'+(i===0?' active-turn':'');
            st.innerHTML = `<span>${p.icon}</span><br><b id="pts${i}">${p.pts}</b>`;
            d.appendChild(st);
        });
        updateStatus(); updatePieces();
    }

    function rollDice(){
        if(rolling) return;
        let p = players[turn];
        if(p.skip){ p.skip = false; alert("Chance Effect! Turn skipped."); endTurn(); return; }
        rolling = true; play('roll');
        const dice = document.getElementById('dice');
        dice.classList.add('rolling');
        const r = Math.floor(Math.random()*6)+1;
        
        setTimeout(()=>{
            dice.classList.remove('rolling');
            const rots = { 1: "rotateX(0deg) rotateY(0deg)", 2: "rotateY(180deg)", 3: "rotateY(-90deg)", 4: "rotateY(90deg)", 5: "rotateX(-90deg)", 6: "rotateX(90deg)" };
            dice.style.transform = rots[r];
            setTimeout(()=>{ movePlayer(r); rolling=false; }, 600);
        }, 1200);
    }

    function movePlayer(s){
        let p = players[turn]; let old = p.pos; p.pos = (p.pos + s) % 24;
        if(p.pos < old) { alert("Round Complete! Winner!"); location.reload(); }
        updatePieces(); setTimeout(()=>handleLanding(p), 600);
    }

    function handleLanding(p){
        if(p.pos === 0) { p.pts += 100; endTurn(); return; }
        if(tileNames[p.pos] === "AUDIT") { p.pts -= 50; alert("Audit Penalty! -50 PTS"); endTurn(); return; }
        if(owners[p.pos] !== undefined && owners[p.pos] !== turn){
            let o = players[owners[p.pos]]; p.pts -= 80; o.pts += 80;
            alert(`Landed on Owned Land: Paid 80 rent to ${o.icon}`); setTimeout(()=>showQuestion(p.pos, p, true), 800);
        } else { showQuestion(p.pos, p, false); }
    }

    function showQuestion(tid, p, isPen){
        const q = questions[Math.floor(Math.random()*questions.length)];
        document.getElementById('qOverlay').style.display = 'flex';
        document.getElementById('qHeader').innerText = isPen ? "PENALTY AUDIT" : "TASK";
        document.getElementById('qText').innerHTML = q.text;
        const area = document.getElementById('optionsArea'); area.innerHTML = '';
        q.options.forEach(opt => {
            const b = document.createElement('button'); b.className = 'btn-mcq'; b.innerHTML = opt;
            b.onclick = () => {
                if(opt === q.correct){
                    play('correct');
                    if(!isPen && owners[tid] === undefined){
                        owners[tid] = turn;
                        const t = document.getElementById('t'+tid);
                        t.style.background = ownerCols[p.id]; t.style.color="white";
                        t.innerHTML += `<span class="owner-tag">${p.icon}</span>`;
                    }
                } else { play('wrong'); if(isPen) p.pts -= 40; }
                document.getElementById('qOverlay').style.display = 'none';
                endTurn();
            };
            area.appendChild(b);
        });
    }

    function buySabotage(){
        let p = players[turn]; if(p.pts < 50) { alert("Need 50 PTS!"); return; }
        p.pts -= 50; updateStats();
        let ts = players.filter((_,i)=>i!==turn);
        if(ts.length > 0){
            let t = ts[Math.floor(Math.random()*ts.length)];
            if(Math.random() > 0.5){ t.skip = true; alert(`Chance! ${t.icon} skips next turn.`); }
            else { t.pos = (t.pos - 2 + 24) % 24; alert(`Chance! ${t.icon} moved 2 steps back.`); updatePieces(); }
        }
        updateStats();
    }

    function endTurn(){
        updateStats(); document.getElementById('stat'+turn).classList.remove('active-turn');
        turn = (turn+1)%players.length; document.getElementById('stat'+turn).classList.add('active-turn');
        updateStatus();
    }
    function updateStats(){ players.forEach((p,i)=>document.getElementById('pts'+i).innerText = p.pts); }
    function updateStatus(){ document.getElementById('statusLabel').innerText = players[turn].icon + "'S TURN"; }
    function updatePieces(){
        players.forEach((p, i) => {
            const t = document.getElementById('t'+p.pos); const pc = document.getElementById('piece'+p.id);
            if(t && pc){ pc.style.left = (t.offsetLeft + (i%2)*10 + 2)+'px'; pc.style.top = (t.offsetTop + Math.floor(i/2)*10 + 2)+'px'; }
        });
    }
</script>
</body>
</html>
